---
# Lint the code base and launch unit test at each push or pull request
name: Test, Build and Deploy
on: # yamllint disable-line rule:truthy
  push:
    # execute when pushing only branches, not tags
    branches:
      - "**"
      # avoid infinite loop for auto created PRs
      - "!update/pre-commit-*"
    tags:
      - "*"
  workflow_dispatch:

# cancel previous build if several pushes
concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      # needed by akatov/commit-status-updater@219d3f932547cad092e384c7a36bf4d963739c35
      statuses: write
      # needed by mikepenz/action-junit-report@v4
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: crazy-max/ghaction-import-gpg@v6
        if: ${{ success() }}
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - uses: tibdex/github-app-token@v2
        if: ${{ success() }}
        id: generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      # -------------------------------------------------------
      # Prepare environment
      # -------------------------------------------------------

      - name: Install requirements
        run: |
          set -exo pipefail
          chmod 777 logs
          cp .env.template .env
          sed -i -E \
              -e "s/^USERNAME=.*\$/USERNAME=$(id -un)/" \
              -e "s#^HOME=.*\$#HOME=${HOME}#" \
              -e "s/^GIT_USERNAME=.*\$/GIT_USERNAME='user group'/" \
              -e "s/^GIT_USER_MAIL=.*\$/GIT_USER_MAIL=ldap@domain.com/" \
              .env

          LOAD_WSLU=0 LOAD_SSH_KEY=0 LOAD_LOCALE_CONFIG=0 ./bin/installRequirements
          vendor/bash-tools-framework/bin/installRequirements

      - name: Set env vars
        id: vars
        run: echo "branch_name=${GITHUB_REF##*/}" >> "${GITHUB_ENV}"

      # -------------------------------------------------------
      # Lint & Run unit tests
      # -------------------------------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - uses: fchastanet/github-action-setup-shfmt@v4.0.0

      - uses: akatov/commit-status-updater@219d3f932547cad092e384c7a36bf4d963739c35
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        with:
          name: build-bash-dev-env
          status: pending

      # install npm dependencies for pre-commit hooks
      - name: Install npm dependencies for pre-commit hooks
        run: npm ci --no-audit --no-fund

      - name: Transform pre-commit config for GitHub
        if: ${{ success() }}
        run: .github/preCommitGeneration.sh

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        id: preCommit
        with:
          extra_args: >-
            -c .pre-commit-config-github.yaml -a --hook-stage manual

      - name: MegaLinter
        id: ml
        if: ${{ always() }}
        # You can override MegaLinter flavor used to have faster performances
        # More info at https://megalinter.io/flavors/
        uses: oxsecurity/megalinter/flavors/terraform@v9
        # All available variables are described in documentation
        # https://megalinter.io/configuration/
        env:
          # Validates all source when push on master,
          # else just the git diff with master.
          # Override with true if you always want to lint all sources
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEGALINTER_CONFIG: .mega-linter-githubAction.yml
          CI_MODE: 1

      - name: Upload MegaLinter artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: MegaLinter reports
          path: |
            megalinter-reports
            mega-linter.log

      - name: Create Pull Request with fixes
        id: createFixesPR
        if: >
          (
            github.event_name == 'push' ||
            github.event.pull_request.head.repo.full_name ==
            github.repository
          ) && (
            steps.preCommit.conclusion == 'failure' ||
            steps.ml.conclusion == 'failure'
          ) && !contains(github.event.head_commit.message, 'skip fix')
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          committer: fchastanet <fchastanet@gmail.com>
          branch: update/pre-commit-fixes-${{ env.branch_name }}
          delete-branch: true
          title: lint fixes
          commit-message: Auto-update lint fixes
          body: |
            some auto fixes have been generated during pre-commit run
          labels: pre-commit-fixes

      - name: Print Pull request created
        if: |
          steps.createFixesPR.outputs.pull-request-number &&
          steps.createFixesPR.conclusion == 'success'
        run: |
          echo "Pull Request Number - ${{ steps.createFixesPR.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.createFixesPR.outputs.pull-request-url }}"

      - name: "Run unit tests"
        id: unitTest
        run: |
          set -exo pipefail
          status=0
          CI_MODE=1 ./test.sh scrasnups/build:bash-tools-ubuntu-5.3 \
            -j 30 --formatter junit -o logs -r src |
            tee logs/test.log || status=$?
          awk '/xml version="1.0"/{flag=1} flag; /<\/testsuites>/{flag=0}' \
            logs/test.log >logs/junit.xml
          exit "${status}"

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: |
          always() && (
            steps.unitTest.outcome == 'failure' || steps.unitTest.outcome == 'success'
          )
        with:
          token: ${{ github.token }}
          check_name: JUnit-bash-dev-env
          fail_on_failure: true
          require_tests: true
          require_passed_tests: true
          report_paths: "logs/**.xml"

      - name: Upload Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Test Results
          path: |
            logs/**

      - uses: akatov/commit-status-updater@219d3f932547cad092e384c7a36bf4d963739c35
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        with:
          name: build-bash-dev-env
          # neutral, success, skipped, cancelled, timed_out, action_required, failure
          status: ${{ job.status }}

  build-deploy:
    needs:
      - build
    # Only run if the build job succeeded, and if the push is on master branch or if it's a workflow dispatch event
    if:
      ${{ needs.build.result == 'success' && (github.ref == 'refs/heads/master' || github.event_name ==
      'workflow_dispatch') }}

    uses: fchastanet/my-documents/.github/workflows/build-site-action.yml@master
    with:
      site-name: "bash-dev-env"
      checkout-repo: "fchastanet/bash-dev-env"
      site-dir: "_site-content"
    permissions:
      contents: read
      pages: write
      id-token: write

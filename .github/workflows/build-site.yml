---
name: Build and Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - 'content/**'
      - 'static/**'
      - 'hugo.yaml'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    uses: fchastanet/my-documents/.github/workflows/build-site-action.yml@master
    with:
      site-name: 'bash-dev-env'
      baseURL: 'https://fchastanet.github.io/bash-dev-env'
      checkout-repo: 'fchastanet/bash-dev-env'
    permissions:
      contents: read
      pages: write
      id-token: write
